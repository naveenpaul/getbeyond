name: test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest + coverage gate
    runs-on: ubuntu-latest

    # The coverage gate is now the combined unit + integration run
    # (vitest.coverage.config.ts). Integration specs need a live Postgres
    # for the TRUNCATE + Prisma round-trips, and the CSV-spill case needs
    # MinIO for the S3 path.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: getbeyond_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        # Bitnami's image auto-creates buckets via MINIO_DEFAULT_BUCKETS,
        # which saves us a separate "mc mb" step. The S3-spill test in
        # csv-import.controller.integration.spec.ts writes into this bucket.
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: getbeyond-blobs
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/getbeyond_test
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: getbeyond-blobs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter '@getbeyond/api' prisma:generate

      - name: Apply migrations to test DB
        run: pnpm --filter '@getbeyond/api' exec prisma migrate deploy

      # CI coverage gate per CLAUDE.md.
      # vitest.coverage.config.ts runs unit + integration suites together.
      # Vitest exits non-zero if line/statement/function coverage <95% or
      # branch coverage <90%. PR merge is blocked when this step fails.
      - name: Test with coverage
        run: pnpm --filter '@getbeyond/api' test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '@getbeyond/api' prisma:generate
      - run: pnpm --filter '@getbeyond/api' typecheck

  depcruise:
    name: dependency-cruiser (architecture invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm depcruise
